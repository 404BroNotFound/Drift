<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#071f27" />
  <title>Visual Escapes — Drift</title>
  <meta name="description" content="Immersive moving scenes paired with calming generative audio." />
  <link rel="icon" href="../assets/drift-mark.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/visuals.css?v=7" />
</head>
<body>
  <main class="escape" id="escape">
    <div class="scene ocean active" data-scene="ocean"><video class="scene-video" muted loop playsinline autoplay preload="auto" poster="../assets/visual-escapes/moonlit-ocean.png"><source src="../assets/videos/ocean.mp4" type="video/mp4"></video></div>
    <div class="scene rain" data-scene="rain"><video class="scene-video" muted loop playsinline preload="none" poster="../assets/visual-escapes/rainy-window.png"><source src="../assets/videos/rain-static.mp4" type="video/mp4"></video></div>
    <div class="scene forest" data-scene="forest"><video class="scene-video" muted loop playsinline preload="none" poster="../assets/visual-escapes/forest-dawn.png"><source src="../assets/videos/forest.mp4" type="video/mp4"></video></div>
    <div class="scene aurora" data-scene="aurora"><video class="scene-video" muted loop playsinline preload="none" poster="../assets/visual-escapes/aurora-night.png"><source src="../assets/videos/aurora.mp4" type="video/mp4"></video></div>
    <div class="scene embers" data-scene="embers"><video class="scene-video" muted loop playsinline preload="none" poster="../assets/visual-escapes/quiet-embers.png"><source src="../assets/videos/embers.mp4" type="video/mp4"></video></div>
    <div class="scene clouds" data-scene="clouds"><video class="scene-video" muted loop playsinline preload="none" poster="../assets/visual-escapes/above-clouds.png"><source src="../assets/videos/clouds.mp4" type="video/mp4"></video></div>
    <div class="scene-shade"></div>

    <header>
      <a href="index.html" class="logo"><img src="../assets/drift-logo.svg" alt="Drift" /></a>
      <span class="page-label">VISUAL ESCAPES</span>
      <a href="index.html#library" class="exit">Exit experience <span>×</span></a>
    </header>

    <section class="scene-copy">
      <span class="eyebrow" id="sceneNumber">01 · NIGHT OCEAN</span>
      <h1 id="sceneTitle">Moonlit<br><em>tides.</em></h1>
      <p id="sceneDescription">Slow waves beneath an open night sky.</p>
    </section>

    <aside class="scene-picker" aria-label="Choose a visual escape">
      <button class="scene-option active" data-target="ocean"><span>01</span><strong>Moonlit Tides</strong><small>Ocean</small></button>
      <button class="scene-option" data-target="rain"><span>02</span><strong>Rainy Window</strong><small>Rain</small></button>
      <button class="scene-option" data-target="forest"><span>03</span><strong>Forest Dawn</strong><small>Nature</small></button>
      <button class="scene-option" data-target="aurora"><span>04</span><strong>Aurora Night</strong><small>Ambient</small></button>
      <button class="scene-option" data-target="embers"><span>05</span><strong>Quiet Embers</strong><small>Fire</small></button>
      <button class="scene-option" data-target="clouds"><span>06</span><strong>Above Clouds</strong><small>Air</small></button>
    </aside>

    <div class="escape-controls">
      <button id="playVisual" class="main-play" aria-label="Play sound">▶</button>
      <div class="track"><span id="trackState">READY WHEN YOU ARE</span><strong id="trackName">Moonlit Tides</strong></div>
      <div class="visual-wave" id="visualWave"></div>
      <span class="session-time" id="sessionTime">00:00</span>
      <label class="volume-label">VOL <input id="visualVolume" type="range" min="0" max="1" step=".01" value=".55" /></label>
      <button id="fullscreen" class="utility" aria-label="Fullscreen">⛶</button>
    </div>
    <span class="footage-credit">Footage by <a href="https://coverr.co/" target="_blank" rel="noopener">Coverr</a> &amp; <a href="https://www.pexels.com/video/raindrops-on-a-window-glass-13292544/" target="_blank" rel="noopener">Gültekin Kaya on Pexels</a></span>
  </main>
  <script src="../js/visuals.js?v=6"></script>
</body>
</html>
